<svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!--
    8×12 pixel Claude sprite (4px per pixel)
    H = #FF9500 orange hair
    F = #FFB899 peach face
    D = #1A0A05 dark features (eyes, smile)
    B = #DA7756 Claude-orange shirt
    P = #5C3D2E dark pants
  -->

  <!-- Row 0: .HHHHHH.  (hair top, cols 1-6) -->
  <rect x="4"  y="0"  width="24" height="4" fill="#FF9500"/>

  <!-- Row 1: HFFFFFFH  (face, hair sides) -->
  <rect x="0"  y="4"  width="4"  height="4" fill="#FF9500"/>
  <rect x="4"  y="4"  width="24" height="4" fill="#FFB899"/>
  <rect x="28" y="4"  width="4"  height="4" fill="#FF9500"/>

  <!-- Row 2: HF·FF·FH  (eyes at col 2 = x8, col 5 = x20) -->
  <rect x="0"  y="8"  width="4"  height="4" fill="#FF9500"/>
  <rect x="4"  y="8"  width="4"  height="4" fill="#FFB899"/>
  <rect x="8"  y="8"  width="4"  height="4" fill="#1A0A05"/>
  <rect x="12" y="8"  width="8"  height="4" fill="#FFB899"/>
  <rect x="20" y="8"  width="4"  height="4" fill="#1A0A05"/>
  <rect x="24" y="8"  width="4"  height="4" fill="#FFB899"/>
  <rect x="28" y="8"  width="4"  height="4" fill="#FF9500"/>

  <!-- Row 3: HFFFFFFH  (plain face) -->
  <rect x="0"  y="12" width="4"  height="4" fill="#FF9500"/>
  <rect x="4"  y="12" width="24" height="4" fill="#FFB899"/>
  <rect x="28" y="12" width="4"  height="4" fill="#FF9500"/>

  <!-- Row 4: H·FFFF·H  (smile corners at col 1=x4, col 6=x24) -->
  <rect x="0"  y="16" width="4"  height="4" fill="#FF9500"/>
  <rect x="4"  y="16" width="4"  height="4" fill="#1A0A05"/>
  <rect x="8"  y="16" width="16" height="4" fill="#FFB899"/>
  <rect x="24" y="16" width="4"  height="4" fill="#1A0A05"/>
  <rect x="28" y="16" width="4"  height="4" fill="#FF9500"/>

  <!-- Row 5: HF····FH  (smile bottom, U-shape closes, cols 2-5 = x8-x20) -->
  <rect x="0"  y="20" width="4"  height="4" fill="#FF9500"/>
  <rect x="4"  y="20" width="4"  height="4" fill="#FFB899"/>
  <rect x="8"  y="20" width="16" height="4" fill="#1A0A05"/>
  <rect x="24" y="20" width="4"  height="4" fill="#FFB899"/>
  <rect x="28" y="20" width="4"  height="4" fill="#FF9500"/>

  <!-- Row 6: HFFFFFFH  (chin) -->
  <rect x="0"  y="24" width="4"  height="4" fill="#FF9500"/>
  <rect x="4"  y="24" width="24" height="4" fill="#FFB899"/>
  <rect x="28" y="24" width="4"  height="4" fill="#FF9500"/>

  <!-- Row 7: .BBBBBB.  (shirt top, cols 1-6) -->
  <rect x="4"  y="28" width="24" height="4" fill="#DA7756"/>

  <!-- Row 8-9: BBBBBBBB  (shirt body) -->
  <rect x="0"  y="32" width="32" height="8"  fill="#DA7756"/>

  <!-- Row 10: .BBBBBB.  (shirt bottom) -->
  <rect x="4"  y="40" width="24" height="4" fill="#DA7756"/>

  <!-- Row 11: .PP..PP.  (legs, cols 1-2 and 5-6) -->
  <rect x="4"  y="44" width="8"  height="4" fill="#5C3D2E"/>
  <rect x="20" y="44" width="8"  height="4" fill="#5C3D2E"/>
</svg>
